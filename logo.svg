<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 185 205">
  <defs>
    <radialGradient id="qg" cx="35%" cy="28%" r="72%">
      <stop offset="0%"   stop-color="#ff3030"/>
      <stop offset="55%"  stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#7a0000"/>
    </radialGradient>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%"   stop-color="#ff4d38"/>
      <stop offset="100%" stop-color="#991111"/>
    </linearGradient>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#cc2020"/>
      <stop offset="100%" stop-color="#550000"/>
    </linearGradient>
    <filter id="sh" x="-18%" y="-15%" width="136%" height="132%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
  </defs>

  <!-- Zeilen - eerst getekend, zichtbaar door Q-opening -->
  <path fill="url(#sg)" d="M 90,13 C 148,44 170,98 161,156 L 90,156 Z"/>
  <path fill="url(#fg)" d="M 90,46 C 128,64 150,106 144,156 L 164,130 C 163,87 143,55 90,46 Z"/>

  <!-- Q-ring: even-odd compound path (buitencirkel min binnencirkel = ring met gat) -->
  <path fill="url(#qg)" fill-rule="evenodd" filter="url(#sh)" d="
    M 90 36 A 72 72 0 1 1 90 180 A 72 72 0 1 1 90 36 Z
    M 90 60 A 48 48 0 1 0 90 156 A 48 48 0 1 0 90 60 Z
  "/>

  <!-- Q-staart rechtsonder -->
  <path fill="url(#qg)" d="M 122,152 L 146,166 L 165,190 Q 157,201 147,195 L 126,174 L 112,163 Z"/>

  <!-- Mast - bovenste laag -->
  <rect x="86" y="5" width="8" height="186" rx="4" fill="#bb0000"/>
</svg>